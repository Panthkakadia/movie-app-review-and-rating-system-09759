<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Form — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card" style="border-radius:var(--radius-lg);">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4">
                        <span th:if="${movie.id == null}"><i class="bi bi-plus-circle me-2" style="color:var(--accent-gold);"></i>Add Movie</span>
                        <span th:if="${movie.id != null}"><i class="bi bi-pencil me-2" style="color:var(--accent-blue);"></i>Edit Movie</span>
                    </h3>
                    <form th:action="@{/admin/movies/save}" th:object="${movie}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{averageRating}">
                        <input type="hidden" th:field="*{reviewCount}">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" th:field="*{title}" th:classappend="${#fields.hasErrors('title')} ? ' is-invalid' : ''" required>
                            <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Error</p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Genre</label>
                                <input type="text" class="form-control" th:field="*{genre}" placeholder="e.g. Action, Drama" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Release Year</label>
                                <input type="number" class="form-control" th:field="*{releaseYear}" min="1900" max="2030" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Poster URL</label>
                            <input type="url" class="form-control" th:field="*{posterUrl}" placeholder="https://image.tmdb.org/t/p/w500/...">
                            <div class="form-text">Paste a direct image URL.</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${movie.id == null} ? 'Add Movie' : 'Save Changes'">Save</span>
                            </button>
                            <a th:href="@{/admin/movies}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
