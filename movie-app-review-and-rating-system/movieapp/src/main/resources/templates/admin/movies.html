<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Movies — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0" style="font-size:1.5rem;"><i class="bi bi-gear me-2" style="color:var(--accent-gold);"></i>Manage Movies</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/tmdb/search}" class="btn btn-outline-primary btn-sm"><i class="bi bi-cloud-download me-1"></i>Import TMDB</a>
            <a th:href="@{/admin/movies/add}" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>Add Movie</a>
        </div>
    </div>
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    <div class="card border-0" style="background:var(--bg-card); border:1px solid var(--border-subtle)!important; border-radius:var(--radius-lg);">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 admin-table">
                <thead>
                    <tr style="background:var(--bg-surface);">
                        <th style="width:60px; color:var(--text-muted);">Poster</th>
                        <th style="color:var(--text-muted);">Title</th>
                        <th style="color:var(--text-muted);">Genre</th>
                        <th style="color:var(--text-muted);">Year</th>
                        <th style="color:var(--text-muted);">Rating</th>
                        <th style="color:var(--text-muted);">Reviews</th>
                        <th style="width:140px; color:var(--text-muted);">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="movie : ${movies}">
                        <td>
                            <img th:if="${movie.posterUrl != null}" th:src="${movie.posterUrl}" width="45" height="65" style="object-fit:cover; border-radius:6px;">
                            <div th:if="${movie.posterUrl == null}" style="width:45px;height:65px;background:var(--bg-surface);border-radius:6px;"></div>
                        </td>
                        <td><a th:href="@{/movies/{id}(id=${movie.id})}" class="fw-semibold text-decoration-none" th:text="${movie.title}">Title</a></td>
                        <td><span class="genre-badge" th:text="${movie.genre}"></span></td>
                        <td style="color:var(--text-secondary);" th:text="${movie.releaseYear}">2024</td>
                        <td>
                            <div class="stars" style="font-size:0.8rem;">
                                <span th:each="i : ${#numbers.sequence(1,5)}" class="star" th:classappend="${i <= movie.averageRating} ? ' filled' : ''">&#9733;</span>
                            </div>
                            <small style="color:var(--text-muted);" th:text="${movie.averageRating}">0.0</small>
                        </td>
                        <td style="color:var(--text-secondary);" th:text="${movie.reviewCount}">0</td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/movies/edit/{id}(id=${movie.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/movies/delete/{id}(id=${movie.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this movie and all its reviews?');"><i class="bi bi-trash"></i></a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
