<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import from TMDB — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container py-4">
    <h2 class="fw-bold mb-4" style="font-size:1.5rem;"><i class="bi bi-cloud-download me-2" style="color:var(--accent-gold);"></i>Import from TMDB</h2>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-warning alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <div class="search-filter-card mb-4">
        <form method="get" th:action="@{/admin/tmdb/search}">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" name="query" class="form-control" placeholder="Search TMDB for movies..." th:value="${query}" required>
                <button type="submit" class="btn btn-primary">Search</button>
            </div>
        </form>
    </div>

    <div th:if="${results != null}">
        <h5 style="color:var(--text-secondary);" class="mb-3"
            th:text="'Found ' + ${results.size()} + ' results'"></h5>
        <div class="row g-3 stagger-children" th:if="${!results.isEmpty()}">
            <div class="col-md-6" th:each="movie : ${results}">
                <div class="tmdb-result-card">
                    <div class="row g-0">
                        <div class="col-4">
                            <img th:if="${movie.fullPosterUrl != null}" th:src="${movie.fullPosterUrl}"
                                 class="img-fluid" style="height:180px;object-fit:cover;width:100%;border-radius:var(--radius-md) 0 0 var(--radius-md);">
                            <div th:if="${movie.fullPosterUrl == null}" class="poster-placeholder" style="height:180px;font-size:0.8rem;border-radius:var(--radius-md) 0 0 var(--radius-md);">No Poster</div>
                        </div>
                        <div class="col-8">
                            <div class="p-3 d-flex flex-column h-100">
                                <h6 class="fw-bold" style="color:var(--text-primary);" th:text="${movie.title}">Title</h6>
                                <small style="color:var(--text-muted);" th:text="${movie.releaseYear > 0 ? movie.releaseYear : 'N/A'}">Year</small>
                                <p style="color:var(--text-muted); font-size:0.8rem; flex-grow:1; margin-top:0.5rem;"
                                   th:text="${movie.description != null && movie.description.length() > 120} ? ${movie.description.substring(0,120)} + '...' : ${movie.description}">Desc</p>
                                <a th:href="@{/admin/tmdb/import/{id}(id=${movie.id})}" class="btn btn-sm btn-outline-success mt-auto align-self-start">
                                    <i class="bi bi-download me-1"></i>Import
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${results.isEmpty()}" class="text-center py-4">
            <p style="color:var(--text-muted);">No results found.</p>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
