<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — MovieApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="auth-container">
    <div class="auth-card animate-scale-in">
        <div class="text-center mb-4">
            <a th:href="@{/}" class="logo"><i class="bi bi-film me-2"></i>MovieApp</a>
            <p style="color:var(--text-secondary);" class="mt-2 mb-0">Create your account to start reviewing movies.</p>
        </div>

        <form th:action="@{/register}" th:object="${registrationDto}" method="post" novalidate>
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" th:field="*{username}" class="form-control"
                           th:classappend="${#fields.hasErrors('username')} ? ' is-invalid' : ''"
                           placeholder="Choose a username" required>
                </div>
                <p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Error</p>
            </div>
            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" th:field="*{email}" class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''"
                           placeholder="you@example.com" required>
                </div>
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</p>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" th:field="*{password}" class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''"
                           placeholder="At least 6 characters" required>
                </div>
                <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</p>
            </div>
            <div class="mb-3">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid' : ''"
                           placeholder="Re-enter your password" required>
                </div>
                <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Error</p>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mt-2">
                <i class="bi bi-person-plus me-1"></i>Create Account
            </button>
        </form>

        <div class="auth-divider"><span>or</span></div>
        <div class="text-center">
            <span style="color:var(--text-muted);">Already have an account?</span>
            <a th:href="@{/login}" class="fw-semibold text-decoration-none ms-1">Sign In</a>
        </div>
        <div class="text-center mt-3">
            <a th:href="@{/}" class="text-decoration-none" style="font-size:0.82rem; color:var(--text-muted);">
                <i class="bi bi-arrow-left me-1"></i>Back to Browse
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
