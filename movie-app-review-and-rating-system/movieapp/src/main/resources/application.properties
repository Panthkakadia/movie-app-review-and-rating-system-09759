# =============================================
# Movie Review & Rating System — Configuration
# =============================================

# MySQL Connection
spring.datasource.url=jdbc:mysql://mysql:3306/movieapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8088
server.error.whitelabel.enabled=false

# TMDB API (get your free key at https://www.themoviedb.org/settings/api)
tmdb.api.key=1373c77ba847af5163fcfffe7172bac4

# Logging
logging.level.com.movieapp=DEBUG
logging.level.org.springframework.security=INFO
